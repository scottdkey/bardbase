name: Release Bardbase Database

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (leave blank for auto-generated v{date}-{sha})'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Download database from artifact
        uses: actions/download-artifact@v4
        with:
          name: bardbase
          path: build/
        continue-on-error: true

      - name: Check for database
        run: |
          if [ ! -f build/bardbase.db ]; then
            echo "::error::No bardbase.db found. Build locally with 'make capell release' instead."
            echo ""
            echo "The database build is too resource-intensive for CI."
            echo "Build locally and use 'make capell release' to create a GitHub release."
            exit 1
          fi

      - name: Generate build info
        id: info
        run: |
          sudo apt-get install -y sqlite3 > /dev/null 2>&1 || true
          DB_SIZE=$(du -h build/bardbase.db | cut -f1)
          TEXT_LINES=$(sqlite3 build/bardbase.db "SELECT COUNT(*) FROM text_lines")
          LEXICON=$(sqlite3 build/bardbase.db "SELECT COUNT(*) FROM lexicon_entries")
          CITATIONS=$(sqlite3 build/bardbase.db "SELECT COUNT(*) FROM lexicon_citations")
          WORKS=$(sqlite3 build/bardbase.db "SELECT COUNT(*) FROM works")

          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "db_size=$DB_SIZE" >> $GITHUB_OUTPUT
          echo "text_lines=$TEXT_LINES" >> $GITHUB_OUTPUT
          echo "lexicon=$LEXICON" >> $GITHUB_OUTPUT
          echo "citations=$CITATIONS" >> $GITHUB_OUTPUT
          echo "works=$WORKS" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.info.outputs.tag }}"

          gh release create "$TAG" \
            --title "Bardbase $TAG" \
            --notes "## Bardbase Database Build

          | Metric | Count |
          |--------|-------|
          | **Works** | ${{ steps.info.outputs.works }} |
          | **Text lines** | ${{ steps.info.outputs.text_lines }} |
          | **Lexicon entries** | ${{ steps.info.outputs.lexicon }} |
          | **Citations** | ${{ steps.info.outputs.citations }} |
          | **Database size** | ${{ steps.info.outputs.db_size }} |

          Built from commit ${{ github.sha }}" \
            build/bardbase.db
