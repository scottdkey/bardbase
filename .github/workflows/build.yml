name: Build Heminge Database

on:
  push:
    branches: [main]
    paths:
      - 'projects/sources/**'
      - 'projects/data/**'
      - 'projects/db-builder/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release with the built database'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/db-builder
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - name: Run tests
        run: go test ./... -v

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Build database
        working-directory: projects/db-builder
        run: go run ./cmd/build -output build

      - name: Generate build info
        id: info
        run: |
          DB_SIZE=$(du -h build/heminge.db | cut -f1)
          TEXT_LINES=$(sqlite3 build/heminge.db "SELECT COUNT(*) FROM text_lines")
          LEXICON=$(sqlite3 build/heminge.db "SELECT COUNT(*) FROM lexicon_entries")
          CITATIONS=$(sqlite3 build/heminge.db "SELECT COUNT(*) FROM lexicon_citations")
          WORKS=$(sqlite3 build/heminge.db "SELECT COUNT(*) FROM works")

          VERSION="v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "db_size=$DB_SIZE" >> $GITHUB_OUTPUT
          echo "text_lines=$TEXT_LINES" >> $GITHUB_OUTPUT
          echo "lexicon=$LEXICON" >> $GITHUB_OUTPUT
          echo "citations=$CITATIONS" >> $GITHUB_OUTPUT
          echo "works=$WORKS" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: heminge
          path: build/heminge.db
          retention-days: 90

      - name: Create release
        if: github.event_name == 'workflow_dispatch' && inputs.release == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.info.outputs.version }}"

          BODY="## Heminge Database Build

          | Metric | Count |
          |--------|-------|
          | **Works** | ${{ steps.info.outputs.works }} |
          | **Text lines** | ${{ steps.info.outputs.text_lines }} |
          | **Lexicon entries** | ${{ steps.info.outputs.lexicon }} |
          | **Citations** | ${{ steps.info.outputs.citations }} |
          | **Database size** | ${{ steps.info.outputs.db_size }} |

          ### Sources
          - **OSS/Moby** — Public Domain (Globe-based modern spelling)
          - **Standard Ebooks** — CC0 (modern-spelling, verse-level)
          - **Schmidt Lexicon** — CC BY-SA 3.0 (Perseus Digital Library)

          ### Usage
          \`\`\`bash
          # Download the pre-built database from this release

          # Or build from source
          git clone https://github.com/scottdkey/heminge.git
          cd heminge
          make db-builder run
          \`\`\`

          Built from commit ${{ github.sha }}"

          gh release create "$VERSION" \
            --title "Heminge $VERSION" \
            --notes "$BODY" \
            build/heminge.db
