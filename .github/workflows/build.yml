name: Build Bardbase Database

on:
  workflow_dispatch:
    inputs:
      exclude_sources:
        description: 'Comma-separated source keys to exclude (e.g. folger,wordhoard). Folger is excluded by default (CC BY-NC 3.0).'
        required: false
        default: 'folger'
      release:
        description: 'Create a release with the built database'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Build database
        working-directory: projects/capell
        run: |
          # Folger is excluded by default (CC BY-NC 3.0 — not safe for commercial use).
          # To include Folger, set exclude_sources to '' in the workflow dispatch.
          EXCLUDE="${{ inputs.exclude_sources }}"
          EXCLUDE_FLAG=""
          IFS=',' read -ra SOURCES <<< "$EXCLUDE"
          for src in "${SOURCES[@]}"; do
            src="${src// /}"
            if [ -n "$src" ]; then
              EXCLUDE_FLAG="$EXCLUDE_FLAG --exclude $src"
            fi
          done
          go run ./cmd/build -output build $EXCLUDE_FLAG

      - name: Generate build info
        id: info
        run: |
          DB_SIZE=$(du -h projects/capell/build/bardbase.db | cut -f1)
          TEXT_LINES=$(sqlite3 projects/capell/build/bardbase.db "SELECT COUNT(*) FROM text_lines")
          LEXICON=$(sqlite3 projects/capell/build/bardbase.db "SELECT COUNT(*) FROM lexicon_entries")
          CITATIONS=$(sqlite3 projects/capell/build/bardbase.db "SELECT COUNT(*) FROM lexicon_citations")
          WORKS=$(sqlite3 projects/capell/build/bardbase.db "SELECT COUNT(*) FROM works")

          VERSION="v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "db_size=$DB_SIZE" >> $GITHUB_OUTPUT
          echo "text_lines=$TEXT_LINES" >> $GITHUB_OUTPUT
          echo "lexicon=$LEXICON" >> $GITHUB_OUTPUT
          echo "citations=$CITATIONS" >> $GITHUB_OUTPUT
          echo "works=$WORKS" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bardbase
          path: projects/capell/build/bardbase.db
          retention-days: 90

      - name: Create release
        if: inputs.release == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.info.outputs.version }}"

          BODY="## Bardbase Database Build

          | Metric | Count |
          |--------|-------|
          | **Works** | ${{ steps.info.outputs.works }} |
          | **Text lines** | ${{ steps.info.outputs.text_lines }} |
          | **Lexicon entries** | ${{ steps.info.outputs.lexicon }} |
          | **Citations** | ${{ steps.info.outputs.citations }} |
          | **Database size** | ${{ steps.info.outputs.db_size }} |

          ### Sources
          - **OSS/Moby** — Public Domain (Globe-based modern spelling)
          - **Standard Ebooks** — CC0 (modern-spelling, verse-level)
          - **Schmidt Lexicon** — CC BY-SA 3.0 (Perseus Digital Library)

          ### Excluded sources
          ${{ inputs.exclude_sources != '' && format('`{0}`', inputs.exclude_sources) || 'None' }}

          ### Usage
          \`\`\`bash
          # Download the pre-built database from this release

          # Or build from source
          git clone https://github.com/scottdkey/bardbase.git
          cd bardbase
          make capell run
          \`\`\`

          Built from commit ${{ github.sha }}"

          gh release create "$VERSION" \
            --title "Bardbase $VERSION" \
            --notes "$BODY" \
            projects/capell/build/bardbase.db
