name: Build Shakespeare Database

on:
  push:
    branches: [main]
    paths:
      - 'sources/**'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run tests
        run: go test ./... -v

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build database
        run: go run ./cmd/build -output build

      - name: Generate build info
        id: info
        run: |
          DB_SIZE=$(du -h build/shakespeare.db | cut -f1)
          # Use sqlite3 to query stats (available on ubuntu-latest)
          TEXT_LINES=$(sqlite3 build/shakespeare.db "SELECT COUNT(*) FROM text_lines")
          LEXICON=$(sqlite3 build/shakespeare.db "SELECT COUNT(*) FROM lexicon_entries")
          CITATIONS=$(sqlite3 build/shakespeare.db "SELECT COUNT(*) FROM lexicon_citations")
          WORKS=$(sqlite3 build/shakespeare.db "SELECT COUNT(*) FROM works")

          VERSION="v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "db_size=$DB_SIZE" >> $GITHUB_OUTPUT
          echo "text_lines=$TEXT_LINES" >> $GITHUB_OUTPUT
          echo "lexicon=$LEXICON" >> $GITHUB_OUTPUT
          echo "citations=$CITATIONS" >> $GITHUB_OUTPUT
          echo "works=$WORKS" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shakespeare-db
          path: build/shakespeare.db
          retention-days: 90

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.version }}
          name: "Shakespeare DB ${{ steps.info.outputs.version }}"
          body: |
            ## Shakespeare Database Build

            | Metric | Count |
            |--------|-------|
            | **Works** | ${{ steps.info.outputs.works }} |
            | **Text lines** | ${{ steps.info.outputs.text_lines }} |
            | **Lexicon entries** | ${{ steps.info.outputs.lexicon }} |
            | **Citations** | ${{ steps.info.outputs.citations }} |
            | **Database size** | ${{ steps.info.outputs.db_size }} |

            ### Sources
            - **OSS/Moby** — Public Domain (Globe-based modern spelling)
            - **Standard Ebooks** — CC0 (modern-spelling, verse-level)
            - **Schmidt Lexicon** — CC BY-SA 3.0 (Perseus Digital Library)

            ### Usage
            ```bash
            # Download the pre-built database from this release

            # Or build from source
            git clone https://github.com/scottdkey/shakespeare_db.git
            cd shakespeare_db
            make setup && make run
            ```

            Built from commit ${{ github.sha }}
          files: build/shakespeare.db
          generate_release_notes: false
