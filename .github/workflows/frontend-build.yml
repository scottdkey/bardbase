name: Frontend Build & Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: projects/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: projects/web/package-lock.json

      - name: Download latest database from release
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build
          gh release download --pattern 'bardbase.db' --dir build/
          ls -lh build/bardbase.db

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build static site
        run: npm run build
        env:
          BARDBASE_DB_PATH: ${{ github.workspace }}/build/bardbase.db

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy projects/web/build --project-name=bardbook
