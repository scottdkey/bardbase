name: Frontend Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'projects/web/**'
      - '.github/workflows/frontend-build.yml'

permissions:
  contents: read
  deployments: write
  packages: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: projects/web

    steps:
      - uses: actions/checkout@v4

      - name: Get latest DB release tag
        id: db-release
        run: |
          TAG=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo "none")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache bardbase.db
        id: db-cache
        uses: actions/cache@v4
        with:
          path: /tmp/bardbase.db
          key: bardbase-db-${{ steps.db-release.outputs.tag }}

      - name: Download bardbase.db
        if: steps.db-cache.outputs.cache-hit != 'true'
        run: |
          gh release download --pattern "bardbase.db" --dir /tmp --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Go API
        run: |
          docker run -d --name bardbase-api -p 8080:8080 \
            -v /tmp/bardbase.db:/app/bardbase.db \
            -e DB_PATH=/app/bardbase.db \
            ghcr.io/${{ github.repository }}/api:latest

      - name: Wait for API
        run: |
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8080/api/works > /dev/null 2>&1; then
              echo "API ready after $((i * 5))s"
              break
            fi
            if [ $i -eq 24 ]; then
              echo "API failed to start after 120s"
              docker logs bardbase-api
              exit 1
            fi
            sleep 5
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: projects/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build for Cloudflare Pages
        run: npm run build
        env:
          CF_PAGES: "1"
          API_URL: "http://localhost:8080"
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/web
          command: pages deploy .svelte-kit/cloudflare --project-name=bardbase

      - name: Stop Go API
        if: always()
        run: docker stop bardbase-api 2>/dev/null || true
