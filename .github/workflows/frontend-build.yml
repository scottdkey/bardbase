name: Frontend Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'projects/web/**'
      - '.github/workflows/frontend-build.yml'

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: projects/web

    steps:
      - uses: actions/checkout@v4

      - name: Get latest DB release tag
        id: db-release
        run: |
          TAG=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo "none")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache bardbase.db
        id: db-cache
        uses: actions/cache@v4
        with:
          path: /tmp/bardbase.db
          key: bardbase-db-${{ steps.db-release.outputs.tag }}

      - name: Download bardbase.db
        if: steps.db-cache.outputs.cache-hit != 'true'
        run: gh release download --pattern "bardbase.db" --dir /tmp --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: projects/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build for Cloudflare Pages
        run: npm run build
        env:
          CF_PAGES: "1"
          DB_PATH: "/tmp/bardbase.db"
          NODE_OPTIONS: "--max-old-space-size=6144"
          TURSO_URL: ${{ vars.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/web
          command: pages deploy .svelte-kit/cloudflare --project-name=bardbase
