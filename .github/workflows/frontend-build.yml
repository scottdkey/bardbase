name: Frontend Build

on:
  push:
    branches: [main]
    paths:
      - 'projects/web/**'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'projects/web/**'
      - '.github/workflows/frontend-build.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: projects/web/package-lock.json

      - name: Download latest database
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build
          gh release download --pattern 'bardbase.db' --dir build/

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build
        env:
          BARDBASE_DB_PATH: ${{ github.workspace }}/build/bardbase.db
