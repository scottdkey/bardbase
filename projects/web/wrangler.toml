name = "bardbase"
pages_build_output_dir = ".svelte-kit/cloudflare"
compatibility_date = "2026-03-21"
compatibility_flags = ["nodejs_compat"]

# DB access is via Turso (libSQL). Set TURSO_URL and TURSO_AUTH_TOKEN in the
# Cloudflare Pages dashboard (Settings → Environment variables → Production
# and Preview). The web app's $lib/server/db reads them via $env/dynamic/private.
