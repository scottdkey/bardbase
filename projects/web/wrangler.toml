name = "bardbase"
pages_build_output_dir = ".svelte-kit/cloudflare"
compatibility_date = "2026-03-21"
compatibility_flags = ["nodejs_compat"]

[vars]
# API_URL is only needed during the static build phase (Go API runs locally in CI).
# At runtime the site is fully static — no Go API dependency.
API_URL = "http://localhost:8080"

# API_KEY is set as a secret in Cloudflare Pages dashboard, not here

# Search database — D1 SQLite, populated by `make capell export-search` in CI.
# Database ID changes when the search DB is rotated (see docs/search-db-rotation.md).
[[d1_databases]]
binding = "SEARCH_DB"
database_name = "bardbase-search-test"
database_id = "82ab37c5-d38a-4026-a63d-f583c3528f53"
