app = "bardbase-api"
primary_region = "sea"

[build]
  image = "ghcr.io/scottdkey/bardbase/api:latest"

[env]
  PORT = "8080"
  DB_PATH = "/app/bardbase.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
