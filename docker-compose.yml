name: bardbase

services:
  go-api:
    build:
      context: ./projects/capell
      dockerfile: Dockerfile.dev
    volumes:
      # Source code — air watches for changes and hot-reloads
      - ./projects/capell:/app
      # Persist Go module cache across restarts
      - go-pkg-cache:/root/go/pkg/mod
      # Read-only access to the compiled database
      - ./build:/data
    environment:
      DB_PATH: /data/bardbase.db
      PORT: "8080"
    ports:
      - "8080:8080"

  web:
    build:
      context: ./projects/web
      dockerfile: Dockerfile.dev
    volumes:
      # Source code — Vite watches for changes and hot-reloads
      - ./projects/web:/app
      # Anonymous volumes: populated from the image layer on every container run.
      # node_modules: always the correct platform build, never stale from a host install.
      # .svelte-kit: always regenerated inside the container, never inherits a stale
      #              host build that was generated for a different adapter or platform.
      - /app/node_modules
      - /app/.svelte-kit
      # Corrections JSON files written by the dev-only corrections API
      - ./corrections:/corrections
    environment:
      API_URL: http://go-api:8080
    ports:
      - "5173:5173"
      # Vite HMR WebSocket — required for hot module replacement in the browser
      - "24678:24678"
    depends_on:
      - go-api

volumes:
  go-pkg-cache:
